    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botpress Full Page Integration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f5f5f5;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      z-index: 9999;
    }

    #loading.hidden {
      display: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #e0e0e0;
      border-top-color: #5e5e5e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #bp-embedded-webchat{
      width: 92%;
      height: 92%;
    }

    /* Make the webchat fill the entire page */
    #bp-web-widget {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
  </div>
  
  <div id="bp-embedded-webchat"></div>

  
    
    
    <script src="https://cdn.botpress.cloud/webchat/v3.3/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/06/03/15/20250603152356-IGY5OTNL.js" defer></script>
    
  <script>
    /**
     * Parse URL parameters
     */
    function getUrlParameters() {
      const params = new URLSearchParams(window.location.search);
      const paramObject = {};
      
      for (const [key, value] of params.entries()) {
        paramObject[key] = value;
      }
      
      return paramObject;
    }


    window.botpress.on('webchat:initialized', (event) => {
        window.botpress.open()
    })

    window.botpress.on('webchat:ready', () => {
        initializeBotpress();
    });
    /**
     * Initialize Botpress Webchat
     */
    async function initializeBotpress() {
      try {
        // Get URL parameters
        const urlParams = getUrlParameters();
        console.log('URL Parameters:', urlParams);

        // Hide loading spinner
        document.getElementById('loading').classList.add('hidden');

        // Send URL parameters as an event to the bot
        if (Object.keys(urlParams).length > 0) {
          console.log('Sending URL parameters to bot:', urlParams);
          
          // Send all URL parameters as a general event
          /*await window.botpress.sendEvent({
            type: 'urlParameters',
            payload: urlParams
          });*/

          // If there's a specific parameter like "product", you can also send it separately
          if (urlParams.product) {
            await window.botpress.sendEvent({
              type: 'productSelected',
              payload: {
                product: urlParams.product
              }
            });
          }

        } else {
          console.log('No URL parameters found');
        }

      } catch (error) {
        console.error('Failed to initialize Botpress:', error);
        document.getElementById('loading').innerHTML = `
          <div style="text-align: center; color: #d32f2f;">
            <h2>Failed to load chatbot</h2>
            <p>${error.message}</p>
          </div>
        `;
      }
    }
  </script>
</body>
</html>

</body>
</html>
