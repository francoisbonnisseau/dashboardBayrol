<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent IA Bayrol - Service Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #chat-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Loading state */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: white;
        }

        .loading h2 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .params-info {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .params-info .param {
            margin: 5px 0;
        }

        .params-info .key {
            color: #ffd700;
            font-weight: bold;
        }

        .params-info .value {
            color: #98fb98;
        }
    </style>
</head>

<body>

    <!-- Full page chat container -->
    <div id="chat-wrapper">
        <div class="loading">
            <div class="spinner"></div>
            <h2>Chargement du chat...</h2>
        </div>
    </div>

    <!-- Load the webchat -->
    <script src="https://francoisbonnisseau.github.io/dashboardBayrol/dist/inject.js"></script>
    <script src="https://francoisbonnisseau.github.io/dashboardBayrol/dist/config_FR_Service_Client.js" defer></script>

</body>


</html>
